<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MAURISSS | OS</title>
    <style>
        body { background: #0a0a0a; color: #00ff00; font-family: 'Courier New', monospace; display: flex; }
        nav { width: 200px; border-right: 1px solid #00ff00; height: 100vh; padding: 20px; }
        main { flex-grow: 1; padding: 20px; }
        a { color: #00ff00; text-decoration: none; display: block; margin: 10px 0; padding: 10px; border: 1px solid transparent; }
        a:hover { border: 1px solid #00ff00; background: #003300; }
        h1 { border-bottom: 2px solid #00ff00; padding-bottom: 10px; }
    </style>
</head>
<body>
    <nav>
        <h2>MENU</h2>
        <a href="#gastos">💰 GASTOS</a>
		    <div id="tabla-gastos">Cargando datos desde la terminal de Mauricio...</div>
		    <button onclick="cargarGastos()">🔄 Actualizar Datos</button>
		<script>
		async function cargarGastos() {
		    const urlTunel = "https://127.0.0.1:5000"; // Tu URL de localtunnel
		    
		    try {
		        const respuesta = await fetch(urlTunel);
		        const htmlGastos = await respuesta.text();
		        document.getElementById('tabla-gastos').innerHTML = htmlGastos;
		    } catch (error) {
		        document.getElementById('tabla-gastos').innerHTML = "❌ Error: La terminal de Córdoba está offline.";
		        console.error("Error de conexión:", error);
		    }
		}

		// Cargar automáticamente al entrar
		cargarGastos();
		</script>
        <a href="#pelis">🎬 PELIS</a>
        <a href="#trading">📊 TRADING</a>
        <a href="#lab">🧪 LAB OWASP</a>
        <a href="#camaras">📹 CAMARAS</a>
    </nav>
    <main>
        <h1>MAURISSS DASHBOARD v1.0</h1>
        <div id="content">
            <p>> Sistema iniciado correctamente...</p>
            <p>> Conexión establecida con éxito.</p>
	    <h1>> Mira mamá, lo logré</p>
        </div>
    </main>
</body>
</html>
